<div class="login-screen">
    <div class="login-card">
        
        <div>
            <i class="bi bi-heart-fill heart-icon"></i>
            <h2 class="brand-name">Criar Conta</h2>
            <p class="sub-text">Junte-se à rede de solidariedade de Brusque</p>
        </div>

        <div *ngIf="erroMensagem()" class="alert alert-danger" style="font-size: 0.75rem; padding: 0.5rem; margin-bottom: 1rem;">
            {{ erroMensagem() }}
        </div>
        <div *ngIf="sucessoMensagem()" class="alert alert-success" style="font-size: 0.75rem; padding: 0.5rem; margin-bottom: 1rem;">
            {{ sucessoMensagem() }}
        </div>

        <form (submit)="cadastrar()">
            <div class="form-group">
                <label class="form-label">Nome Completo</label>
                <input type="text" class="form-control" [(ngModel)]="cadastroData.nome" name="nome" placeholder="Digite seu nome" required>
            </div>

            <div class="form-group">
                <label class="form-label">E-mail</label>
                <input type="email" class="form-control" [(ngModel)]="cadastroData.email" name="email" placeholder="exemplo@unifebe.edu.br" required>
            </div>
            
            <div class="form-group mb-4">
                <label class="form-label">Crie uma Senha</label>
                <input type="password" class="form-control" [(ngModel)]="cadastroData.senha" name="senha" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-login">
                Cadastrar
            </button>
        </form>

        <div class="links-section" style="display: flex; justify-content: center; margin-top: 1.5rem;">
            <a routerLink="/login" style="color: #3461ff; font-weight: 600; font-size: 0.8rem;">
                <i class="bi bi-arrow-left me-1"></i> Já tenho uma conta
            </a>
        </div>

    </div>
</div>
