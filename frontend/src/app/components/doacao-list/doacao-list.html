<div class="container-fluid py-3">
    <div class="card border-0 shadow-sm rounded-3 mb-4">
        <div class="card-header bg-success text-white py-3 rounded-top-3">
            <h5 class="mb-0 fw-bold"><i class="bi bi-plus-circle me-2"></i> Nova Doação</h5>
        </div>
        <div class="card-body p-4">
            <div class="row g-3 align-items-end">
                <div class="col-md-4">
                    <label class="form-label text-muted small fw-semibold">Item</label>
                    <input type="text" class="form-control" [(ngModel)]="novaDoacao.item" placeholder="Ex: Cesta Básica">
                </div>
                <div class="col-md-2">
                    <label class="form-label text-muted small fw-semibold">Qtd</label>
                    <input type="number" class="form-control" [(ngModel)]="novaDoacao.quantidade">
                </div>
                <div class="col-md-3">
                    <label class="form-label text-muted small fw-semibold">Categoria</label>
                    <select class="form-select" [(ngModel)]="novaDoacao.categoria">
                        <option value="" disabled selected>Selecione...</option>
                        <option value="Alimentos">Alimentos</option>
                        <option value="Roupas">Roupas</option>
                        <option value="Higiene">Higiene</option>
                        <option value="Eletrônicos">Eletrônicos</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label text-muted small fw-semibold">Doador</label>
                    <input type="text" class="form-control" [(ngModel)]="novaDoacao.nomeDoador" placeholder="Seu nome">
                </div>
            </div>
            <div class="d-flex justify-content-end mt-4">
                <button class="btn btn-success px-4" (click)="salvarDoacao()">
                    <i class="bi bi-check2 me-1"></i> Confirmar Doação
                </button>
            </div>
        </div>
    </div>

    <div class="card border-0 shadow-sm rounded-3">
        <div class="card-header bg-primary text-white py-3 rounded-top-3 d-flex justify-content-between align-items-center">
            <h5 class="mb-0 fw-bold"><i class="bi bi-gift-fill me-2"></i> Doações Recebidas</h5>
            <span class="badge bg-light text-primary">{{ doacoes().length }} registros</span>
        </div>
        <div class="card-body p-0">
            <table class="table table-hover align-middle mb-0">
                <thead class="bg-light text-dark text-muted small">
                    <tr>
                        <th class="ps-4"># ID</th>
                        <th>Item</th>
                        <th>Qtd</th>
                        <th>Categoria</th>
                        <th>Doador</th>
                        <th>ONG Destino</th>
                        <th class="text-center">Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <tr *ngFor="let d of doacoes()">
                        <td class="ps-4 fw-bold">#{{ d.id }}</td>
                        <td>{{ d.item }}</td>
                        <td><span class="badge bg-info text-white rounded-pill px-3 py-2">{{ d.quantidade }}</span></td>
                        <td>{{ d.categoria }}</td>
                        <td>{{ d.nomeDoador }}</td>
                        <td class="text-muted small">Pendente</td>
                        <td class="text-center">
                            <button class="btn btn-outline-danger btn-sm rounded-1" (click)="excluirDoacao(d.id)" title="Excluir">
                                <i class="bi bi-trash"></i>
                            </button>
                        </td>
                    </tr>
                    
                    <tr *ngIf="doacoes().length === 0">
                        <td colspan="7" class="text-center py-4 text-muted">Nenhuma doação cadastrada no UniSolidária.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
