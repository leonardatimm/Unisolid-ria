<div class="container-fluid py-3">
    <div class="card border-0 shadow-sm rounded-3 mb-4">
        <div class="card-header bg-success text-white py-3 rounded-top-3">
            <h5 class="mb-0 fw-bold"><i class="bi bi-building-add me-2"></i> Cadastrar Nova ONG</h5>
        </div>
        <div class="card-body p-4">
            <div class="row g-3 align-items-end">
                <div class="col-md-4">
                    <label class="form-label text-muted small fw-semibold">Nome Fantasia</label>
                    <input type="text" class="form-control" [(ngModel)]="novaOng.nomeFantasia" placeholder="Ex: Anjos da Guarda">
                </div>
                <div class="col-md-4">
                    <label class="form-label text-muted small fw-semibold">Razão Social</label>
                    <input type="text" class="form-control" [(ngModel)]="novaOng.nomeReal" placeholder="Nome jurídico">
                </div>
                <div class="col-md-4">
                    <label class="form-label text-muted small fw-semibold">CNPJ</label>
                    <input type="text" class="form-control" [(ngModel)]="novaOng.cnpj" placeholder="00.000.000/0001-00">
                </div>
                <div class="col-md-4">
                    <label class="form-label text-muted small fw-semibold">Responsável</label>
                    <input type="text" class="form-control" [(ngModel)]="novaOng.responsavel" placeholder="Nome do Responsável">
                </div>
                <div class="col-md-4">
                    <label class="form-label text-muted small fw-semibold">CPF do Responsável</label>
                    <input type="text" class="form-control" [(ngModel)]="novaOng.cpfResponsavel" placeholder="000.000.000-00">
                </div>
                <div class="col-md-4">
                    <label class="form-label text-muted small fw-semibold">Telefone</label>
                    <input type="text" class="form-control" [(ngModel)]="novaOng.telefoneResponsavel" placeholder="(00) 00000-0000">
                </div>
            </div>
            <div class="d-flex justify-content-end mt-4">
                <button class="btn btn-success px-4" (click)="salvarOng()">
                    <i class="bi bi-check2 me-1"></i> Confirmar Cadastro
                </button>
            </div>
        </div>
    </div>

    <div class="card border-0 shadow-sm rounded-3">
        <div class="card-header bg-primary text-white py-3 rounded-top-3 d-flex justify-content-between align-items-center">
            <h5 class="mb-0 fw-bold"><i class="bi bi-building me-2"></i> ONGs Parceiras</h5>
            <span class="badge bg-light text-primary">{{ ongs().length }} registros</span>
        </div>
        <div class="card-body p-0">
            <table class="table table-hover align-middle mb-0">
                <thead class="bg-light text-dark text-muted small">
                    <tr>
                        <th class="ps-4"># ID</th>
                        <th>Nome Fantasia</th>
                        <th>CNPJ</th>
                        <th>Responsável</th>
                        <th>Telefone</th>
                        <th class="text-center">Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <tr *ngFor="let o of ongs()">
                        <td class="ps-4 fw-bold">#{{ o.id }}</td>
                        <td>{{ o.nomeFantasia }}</td>
                        <td><span class="badge bg-secondary text-white rounded-pill px-3 py-2">{{ o.cnpj }}</span></td>
                        <td>{{ o.responsavel }}</td>
                        <td>{{ o.telefoneResponsavel }}</td>
                        <td class="text-center">
                            <button class="btn btn-outline-danger btn-sm rounded-1" (click)="excluirOng(o.id)" title="Excluir">
                                <i class="bi bi-trash"></i>
                            </button>
                        </td>
                    </tr>
                    
                    <tr *ngIf="ongs().length === 0">
                        <td colspan="6" class="text-center py-4 text-muted">Nenhuma ONG cadastrada no UniSolidária.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
